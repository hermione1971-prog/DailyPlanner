<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#527a54" />
    <title>まいにち手帳</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="date-label" id="todayLabel"></p>
          <h1>まいにち手帳</h1>
          <p class="top-note">小さな努力を、物語みたいに積み重ねる。</p>
        </div>
        <img class="hero-visual" src="anne-study.jpg" alt="赤毛のアンを思わせる書斎で学習する女の子のイラスト" />
        <div class="score-card" aria-live="polite">
          <span id="doneCount">0</span>
          <small>できた</small>
        </div>
      </header>

      <main>
        <section class="focus-band" aria-labelledby="focusTitle">
          <div>
            <p class="eyebrow">Green Gables note</p>
            <h2 id="focusTitle">今日のいちばん</h2>
          </div>
          <form class="focus-form" id="focusForm">
            <input
              id="focusInput"
              type="text"
              maxlength="44"
              placeholder="例：英語30分、簿記1章、夕食の下ごしらえ"
              aria-label="今日の一番大切なこと"
            />
            <button type="submit">設定</button>
          </form>
          <p class="focus-text" id="focusText"></p>
        </section>

        <section class="dashboard-grid">
          <div class="panel task-panel" aria-labelledby="taskTitle">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Kindred list</p>
                <h2 id="taskTitle">今日の小さな一歩</h2>
              </div>
              <button class="quiet-button" type="button" id="clearDoneButton">できたことを整理</button>
            </div>

            <form class="task-form" id="taskForm">
              <input
                id="taskInput"
                type="text"
                maxlength="80"
                placeholder="やることを入力"
                aria-label="新しいタスク"
                required
              />
              <select id="categoryInput" aria-label="カテゴリ">
                <option value="家事">家事</option>
                <option value="リベ活">リベ活</option>
                <option value="資格">資格</option>
                <option value="英語">英語</option>
                <option value="海外ワーク">海外ワーク</option>
                <option value="自分時間">自分時間</option>
              </select>
              <select id="priorityInput" aria-label="優先度">
                <option value="3">高</option>
                <option value="2" selected>中</option>
                <option value="1">低</option>
              </select>
              <button type="submit">追加</button>
            </form>

            <div class="filters" aria-label="表示切り替え">
              <button class="filter-button active" type="button" data-filter="all">すべて</button>
              <button class="filter-button" type="button" data-filter="active">未完了</button>
              <button class="filter-button" type="button" data-filter="done">完了</button>
            </div>

            <ul class="task-list" id="taskList"></ul>
            <p class="empty-state" id="emptyState">今日のタスクを追加しましょう。</p>
          </div>

          <aside class="panel" aria-labelledby="goalsTitle">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Orchard progress</p>
                <h2 id="goalsTitle">カテゴリの進み具合</h2>
              </div>
            </div>
            <div class="goal-list" id="goalList"></div>
          </aside>
        </section>
      </main>
    </div>

    <template id="taskTemplate">
      <li class="task-item">
        <button class="check-button" type="button" aria-label="完了にする"></button>
        <div class="task-main">
          <span class="task-title"></span>
          <div class="task-meta">
            <span class="category-pill"></span>
            <span class="priority-pill"></span>
          </div>
        </div>
        <button class="delete-button" type="button" aria-label="削除">×</button>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
